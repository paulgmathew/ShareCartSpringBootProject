spring.application.name=sharecart

# Local PostgreSQL datasource
# Make sure PostgreSQL is running locally and the database exists.
# Create it with: CREATE DATABASE sharecartdb;
spring.datasource.url=jdbc:postgresql://localhost:5432/sharecartdb;
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=docker1

# To use production DB settings, run with:
# --spring.profiles.active=prod

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
